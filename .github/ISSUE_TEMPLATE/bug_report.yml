name: Bug Report
description: Report an issue with a generated MCP server
labels: ["bug"]
body:
  - type: input
    id: server
    attributes:
      label: Server
      description: Which server is affected?
      placeholder: e.g. github, notion, datadog
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Issue category
      options:
        - Broken or deprecated endpoint
        - Missing or incorrect parameters
        - Authentication problem
        - Incorrect request/response model
        - Runtime error
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong? Include the tool name, error message, and steps to reproduce.
      placeholder: |
        Tool: `create_issue`
        Error: 422 Unprocessable Entity — missing required field `repo`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: false
