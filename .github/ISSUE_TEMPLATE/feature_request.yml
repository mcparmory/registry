name: Feature Request
description: Suggest an improvement to an existing server or the registry
labels: ["enhancement"]
body:
  - type: input
    id: server
    attributes:
      label: Server (if applicable)
      placeholder: e.g. github, notion, or leave blank for general requests
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see improved?
    validations:
      required: true
